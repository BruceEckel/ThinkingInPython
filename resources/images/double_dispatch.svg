<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420"
     font-family="'JetBrains Mono', Consolas, monospace">
  <defs>
    <marker id="dd-tri" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1612" stroke="#1a1612" stroke-width="1"/>
    </marker>
    <marker id="dd-tri-open" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f5f0e8" stroke="#7a6e62" stroke-width="1"/>
    </marker>
  </defs>

  <!-- lifelines -->
  <line x1="150" y1="60" x2="150" y2="330" stroke="#c8bfb0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="550" y1="60" x2="550" y2="330" stroke="#c8bfb0" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="60" y="24" width="180" height="34" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="5"/>
  <text x="150" y="46" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">scissors : Scissors</text>

  <rect x="460" y="24" width="180" height="34" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="5"/>
  <text x="550" y="46" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">paper : Paper</text>

  <!-- activation bars -->
  <rect x="145" y="90" width="10" height="220" fill="#1a1612" fill-opacity="0.07" stroke="#c8bfb0"/>
  <rect x="545" y="175" width="10" height="75" fill="#1a1612" fill-opacity="0.07" stroke="#c8bfb0"/>

  <!-- call 1: duel() -> scissors.compete(paper) -->
  <line x1="20" y1="90" x2="143" y2="90" stroke="#1a1612" stroke-width="1.3" marker-end="url(#dd-tri)"/>
  <text x="82" y="80" font-size="10.5" fill="#1a1612" text-anchor="middle">duel(): scissors.compete(paper)</text>
  <text x="165" y="112" font-size="10.5" fill="#7a6e62">running: Scissors.compete()</text>
  <text x="165" y="126" font-size="10.5" fill="#7a6e62">self=scissors, item=paper</text>

  <text x="350" y="150" font-size="10.5" font-style="italic" fill="#8b1a1a" text-anchor="middle">self and item swap sides on the second call</text>

  <!-- call 2: item.eval_scissors(self) -> paper.eval_scissors(scissors) -->
  <line x1="155" y1="175" x2="543" y2="175" stroke="#1a1612" stroke-width="1.3" marker-end="url(#dd-tri)"/>
  <text x="350" y="167" font-size="10.5" fill="#1a1612" text-anchor="middle">item.eval_scissors(self)</text>
  <text x="565" y="197" font-size="10.5" fill="#7a6e62">running: Paper.eval_scissors()</text>
  <text x="565" y="211" font-size="10.5" fill="#7a6e62">self=paper, item=scissors</text>
  <text x="565" y="229" font-size="10.5" fill="#1a1612">return Outcome.WIN</text>

  <!-- return: paper.eval_scissors -> scissors.compete -->
  <line x1="543" y1="260" x2="157" y2="260" stroke="#7a6e62" stroke-width="1.2" stroke-dasharray="1,4" marker-end="url(#dd-tri-open)"/>
  <text x="350" y="253" font-size="10.5" fill="#7a6e62" text-anchor="middle">-&gt; Outcome.WIN</text>

  <!-- return: scissors.compete -> duel() -->
  <line x1="143" y1="310" x2="20" y2="310" stroke="#7a6e62" stroke-width="1.2" stroke-dasharray="1,4" marker-end="url(#dd-tri-open)"/>
  <text x="82" y="303" font-size="10.5" fill="#7a6e62" text-anchor="middle">-&gt; Outcome.WIN</text>

  <text x="360" y="350" font-size="11.5" fill="#1a1612" text-anchor="middle">duel() prints: Scissors &lt;--&gt; Paper : win</text>

  <text x="360" y="400" font-size="11.5" fill="#7a6e62" text-anchor="middle">Two method calls, two dispatches: the first resolves self's type, the second resolves item's type</text>
</svg>
