<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220"
     font-family="'JetBrains Mono', Consolas, monospace">
  <title>The parts of a list comprehension</title>
  <defs>
    <marker id="lc-tri" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f5f0e8" stroke="#1a1612" stroke-width="1"/>
    </marker>
  </defs>

  <!-- top callouts: Output Expression, Input Sequence -->
  <line x1="115" y1="28" x2="115" y2="92" stroke="#7a6e62" stroke-width="1.2"
        marker-end="url(#lc-tri)"/>
  <text x="115" y="18" font-size="13" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">Output Expression</text>

  <line x1="365" y1="28" x2="365" y2="92" stroke="#7a6e62" stroke-width="1.2"
        marker-end="url(#lc-tri)"/>
  <text x="365" y="18" font-size="13" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">Input Sequence</text>

  <!-- the comprehension itself -->
  <text x="18" y="140" font-size="50" fill="#1a1612">[</text>

  <rect x="60" y="95" width="110" height="50" rx="6" fill="none"
        stroke="#c8bfb0" stroke-width="1.3"/>
  <text x="82" y="126" font-size="18" font-weight="bold" fill="#8b1a1a">e ** 2</text>

  <rect x="200" y="95" width="230" height="50" rx="6" fill="none"
        stroke="#c8bfb0" stroke-width="1.3"/>
  <text x="233" y="126" font-size="18">
    <tspan fill="#1a1612">for </tspan>
    <tspan fill="#8b1a1a" font-weight="bold">e</tspan>
    <tspan fill="#1a1612"> in </tspan>
    <tspan fill="#8b1a1a" font-weight="bold">a_list</tspan>
  </text>

  <rect x="460" y="95" width="260" height="50" rx="6" fill="none"
        stroke="#c8bfb0" stroke-width="1.3"/>
  <text x="475" y="126" font-size="18" font-weight="bold"
        fill="#8b1a1a">if isinstance(e, int)</text>

  <text x="735" y="140" font-size="50" fill="#1a1612">]</text>

  <!-- bottom callouts: Variable, Optional Predicate -->
  <line x1="282" y1="186" x2="282" y2="148" stroke="#7a6e62" stroke-width="1.2"
        marker-end="url(#lc-tri)"/>
  <text x="282" y="200" font-size="13" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">Variable</text>

  <line x1="460" y1="148" x2="460" y2="153" stroke="#7a6e62" stroke-width="1.2"/>
  <line x1="720" y1="148" x2="720" y2="153" stroke="#7a6e62" stroke-width="1.2"/>
  <line x1="460" y1="153" x2="720" y2="153" stroke="#7a6e62" stroke-width="1.2"/>
  <line x1="590" y1="153" x2="590" y2="186" stroke="#7a6e62" stroke-width="1.2"/>
  <text x="590" y="200" font-size="13" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">Optional Predicate</text>
</svg>
