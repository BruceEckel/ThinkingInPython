<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220"
     font-family="'JetBrains Mono', Consolas, monospace">
  <title>A 3 by 3 identity matrix</title>

  <polyline points="80,15 60,15 60,205 80,205" fill="none"
            stroke="#1a1612" stroke-width="6" stroke-linecap="square"/>
  <polyline points="235,15 255,15 255,205 235,205" fill="none"
            stroke="#1a1612" stroke-width="6" stroke-linecap="square"/>

  <!-- row 0 -->
  <text x="102" y="72" font-size="26" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">1</text>
  <text x="157" y="72" font-size="26" fill="#7a6e62" text-anchor="middle">0</text>
  <text x="212" y="72" font-size="26" fill="#7a6e62" text-anchor="middle">0</text>

  <!-- row 1 -->
  <text x="102" y="127" font-size="26" fill="#7a6e62" text-anchor="middle">0</text>
  <text x="157" y="127" font-size="26" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">1</text>
  <text x="212" y="127" font-size="26" fill="#7a6e62" text-anchor="middle">0</text>

  <!-- row 2 -->
  <text x="102" y="182" font-size="26" fill="#7a6e62" text-anchor="middle">0</text>
  <text x="157" y="182" font-size="26" fill="#7a6e62" text-anchor="middle">0</text>
  <text x="212" y="182" font-size="26" font-weight="bold" fill="#8b1a1a"
        text-anchor="middle">1</text>
</svg>
