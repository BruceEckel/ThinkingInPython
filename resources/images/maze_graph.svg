<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380"
     font-family="'JetBrains Mono', Consolas, monospace">
  <defs>
    <marker id="mz-tri" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f5f0e8" stroke="#1a1612" stroke-width="1"/>
    </marker>
  </defs>

  <!-- grid: Rooms connected through Doors -->
  <rect x="40" y="50" width="384" height="280" fill="none" stroke="#c8bfb0" stroke-width="1.3"/>
  <line x1="104" y1="50" x2="104" y2="330" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="168" y1="50" x2="168" y2="330" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="232" y1="50" x2="232" y2="330" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="296" y1="50" x2="296" y2="330" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="360" y1="50" x2="360" y2="330" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="40" y1="106" x2="424" y2="106" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="40" y1="162" x2="424" y2="162" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="40" y1="218" x2="424" y2="218" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="40" y1="274" x2="424" y2="274" stroke="#c8bfb0" stroke-width="1"/>

  <!-- non-local teleport jumps, overlaid on the grid -->
  <path d="M200,134 Q264,95 328,246" fill="none" stroke="#8b1a1a" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="278" y="150" font-size="11" fill="#8b1a1a" text-anchor="middle">Teleport target="a"</text>

  <path d="M328,78 Q232,40 136,190" fill="none" stroke="#7a6e62" stroke-width="1.4" stroke-dasharray="2,4"/>
  <text x="255" y="55" font-size="11" fill="#7a6e62" text-anchor="middle">Teleport target="b"</text>

  <!-- off-map doors converge on the single shared EDGE room -->
  <polyline points="200,78 200,20 452,20 452,167 460,167" fill="none" stroke="#7a6e62"
            stroke-width="1.1" marker-end="url(#mz-tri)"/>
  <polyline points="392,134 452,134 452,192 460,192" fill="none" stroke="#7a6e62"
            stroke-width="1.1" marker-end="url(#mz-tri)"/>
  <polyline points="72,302 72,345 452,345 452,217 460,217" fill="none" stroke="#7a6e62"
            stroke-width="1.1" marker-end="url(#mz-tri)"/>

  <!-- room markers -->
  <circle cx="72" cy="78" r="15" fill="none" stroke="#1a1612" stroke-width="1.3"/>
  <text x="72" y="83" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">R</text>

  <circle cx="392" cy="302" r="15" fill="none" stroke="#1a1612" stroke-width="1.3"/>
  <text x="392" y="307" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">!</text>

  <circle cx="200" cy="134" r="15" fill="none" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="200" y="139" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">a</text>

  <circle cx="328" cy="246" r="15" fill="none" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="328" y="251" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">a</text>

  <circle cx="328" cy="78" r="15" fill="none" stroke="#7a6e62" stroke-width="1.5" stroke-dasharray="2,3"/>
  <text x="328" y="83" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">b</text>

  <circle cx="136" cy="190" r="15" fill="none" stroke="#7a6e62" stroke-width="1.5" stroke-dasharray="2,3"/>
  <text x="136" y="195" font-size="13" font-weight="bold" fill="#1a1612" text-anchor="middle">b</text>

  <!-- shared EDGE sentinel -->
  <rect x="460" y="150" width="150" height="80" fill="none" stroke="#8b1a1a" stroke-width="1.5" rx="6"/>
  <text x="535" y="187" font-size="14" font-weight="bold" fill="#1a1612" text-anchor="middle">EDGE</text>
  <text x="535" y="205" font-size="10.5" fill="#7a6e62" text-anchor="middle">every off-map door</text>

  <text x="320" y="365" font-size="11.5" fill="#7a6e62" text-anchor="middle">Grid adjacency from Doors.connect(); non-local jumps from paired Teleports; every edge door shares one EDGE room</text>
</svg>
