<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300"
     font-family="'JetBrains Mono', Consolas, monospace">
  <defs>
    <marker id="fw-tri" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f5f0e8" stroke="#1a1612" stroke-width="1"/>
    </marker>
  </defs>

  <!-- convergence lines: representative cells to shared Tile objects -->
  <polyline points="135,200 135,225 480,225 480,55 520,55" fill="none"
            stroke="#7a6e62" stroke-width="1.1" marker-end="url(#fw-tri)"/>
  <polyline points="135,40 135,15 480,15 480,135 520,135" fill="none"
            stroke="#8b1a1a" stroke-width="1.2" marker-end="url(#fw-tri)"/>
  <polyline points="273,200 273,235 495,235 495,135 520,135" fill="none"
            stroke="#8b1a1a" stroke-width="1.2" marker-end="url(#fw-tri)"/>
  <polyline points="43,200 43,245 505,245 505,215 520,215" fill="none"
            stroke="#7a6e62" stroke-width="1.1" marker-end="url(#fw-tri)"/>

  <text x="300" y="12" font-size="11" fill="#8b1a1a" text-anchor="middle">field[0][2]</text>
  <text x="300" y="248" font-size="11" fill="#8b1a1a" text-anchor="middle">field[3][5]</text>
  <text x="508" y="122" font-size="11" font-style="italic" fill="#8b1a1a" text-anchor="middle">is</text>

  <!-- grid: 4 rows x 6 cols, parse_map output -->
  <!-- row 0 -->
  <rect x="20" y="40" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="43" y="65" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="66" y="40" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="89" y="65" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="112" y="40" width="46" height="40" fill="#1a1612" fill-opacity="0.10" stroke="#8b1a1a" stroke-width="2"/>
  <text x="135" y="65" font-size="15" text-anchor="middle" fill="#1a1612">~</text>
  <rect x="158" y="40" width="46" height="40" fill="#1a1612" fill-opacity="0.10" stroke="#c8bfb0"/>
  <text x="181" y="65" font-size="15" text-anchor="middle" fill="#1a1612">~</text>
  <rect x="204" y="40" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="227" y="65" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="250" y="40" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="273" y="65" font-size="15" text-anchor="middle" fill="#1a1612">.</text>

  <!-- row 1 -->
  <rect x="20" y="80" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="43" y="105" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="66" y="80" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="89" y="105" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="112" y="80" width="46" height="40" fill="#1a1612" fill-opacity="0.10" stroke="#c8bfb0"/>
  <text x="135" y="105" font-size="15" text-anchor="middle" fill="#1a1612">~</text>
  <rect x="158" y="80" width="46" height="40" fill="#1a1612" fill-opacity="0.10" stroke="#c8bfb0"/>
  <text x="181" y="105" font-size="15" text-anchor="middle" fill="#1a1612">~</text>
  <rect x="204" y="80" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="227" y="105" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="250" y="80" width="46" height="40" fill="#1a1612" fill-opacity="0.18" stroke="#c8bfb0"/>
  <text x="273" y="105" font-size="15" text-anchor="middle" fill="#1a1612">#</text>

  <!-- row 2 -->
  <rect x="20" y="120" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="43" y="145" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="66" y="120" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="89" y="145" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="112" y="120" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="135" y="145" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="158" y="120" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="181" y="145" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="204" y="120" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="227" y="145" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="250" y="120" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="273" y="145" font-size="15" text-anchor="middle" fill="#1a1612">.</text>

  <!-- row 3 -->
  <rect x="20" y="160" width="46" height="40" fill="#1a1612" fill-opacity="0.18" stroke="#c8bfb0"/>
  <text x="43" y="185" font-size="15" text-anchor="middle" fill="#1a1612">#</text>
  <rect x="66" y="160" width="46" height="40" fill="#1a1612" fill-opacity="0.18" stroke="#c8bfb0"/>
  <text x="89" y="185" font-size="15" text-anchor="middle" fill="#1a1612">#</text>
  <rect x="112" y="160" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="135" y="185" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="158" y="160" width="46" height="40" fill="#1a1612" fill-opacity="0.04" stroke="#c8bfb0"/>
  <text x="181" y="185" font-size="15" text-anchor="middle" fill="#1a1612">.</text>
  <rect x="204" y="160" width="46" height="40" fill="#1a1612" fill-opacity="0.10" stroke="#c8bfb0"/>
  <text x="227" y="185" font-size="15" text-anchor="middle" fill="#1a1612">~</text>
  <rect x="250" y="160" width="46" height="40" fill="#1a1612" fill-opacity="0.10" stroke="#8b1a1a" stroke-width="2"/>
  <text x="273" y="185" font-size="15" text-anchor="middle" fill="#1a1612">~</text>

  <!-- shared Tile objects -->
  <rect x="520" y="30" width="160" height="50" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="6"/>
  <text x="600" y="50" font-size="14" font-weight="bold" fill="#1a1612" text-anchor="middle">grass  (.)</text>
  <text x="600" y="67" font-size="11" fill="#7a6e62" text-anchor="middle">walkable = True</text>

  <rect x="520" y="110" width="160" height="50" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="6"/>
  <text x="600" y="130" font-size="14" font-weight="bold" fill="#1a1612" text-anchor="middle">water  (~)</text>
  <text x="600" y="147" font-size="11" fill="#7a6e62" text-anchor="middle">walkable = False</text>

  <rect x="520" y="190" width="160" height="50" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="6"/>
  <text x="600" y="210" font-size="14" font-weight="bold" fill="#1a1612" text-anchor="middle">rock  (#)</text>
  <text x="600" y="227" font-size="11" fill="#7a6e62" text-anchor="middle">walkable = False</text>

  <text x="360" y="285" font-size="11.5" fill="#7a6e62" text-anchor="middle">24 cells, 3 Tile objects</text>
</svg>
