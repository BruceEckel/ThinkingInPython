<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600"
     font-family="'JetBrains Mono', Consolas, monospace">

  <text x="220" y="30" font-size="11" fill="#7a6e62">time -&gt;</text>
  <line x1="220" y1="38" x2="590" y2="38" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="580" y1="34" x2="590" y2="38" stroke="#c8bfb0" stroke-width="1"/>
  <line x1="580" y1="42" x2="590" y2="38" stroke="#c8bfb0" stroke-width="1"/>

  <!-- BAND 1: asyncio -->
  <text x="20" y="72" font-size="13" font-weight="bold" fill="#1a1612">asyncio</text>
  <text x="20" y="88" font-size="10.5" fill="#7a6e62">1 OS thread</text>
  <rect x="210" y="60" width="380" height="30" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <rect x="220" y="68" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <rect x="284" y="68" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <rect x="348" y="68" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <rect x="412" y="68" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <rect x="476" y="68" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <text x="400" y="108" font-size="10.5" fill="#7a6e62" text-anchor="middle">peak=1: cpu_price never awaits, so one call finishes before the next starts</text>

  <!-- BAND 2: threads -->
  <text x="20" y="150" font-size="13" font-weight="bold" fill="#1a1612">ThreadPoolExecutor</text>
  <text x="20" y="166" font-size="10.5" fill="#7a6e62">5 OS threads</text>
  <rect x="210" y="140" width="380" height="112" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="400" y="154" font-size="10.5" font-style="italic" fill="#8b1a1a" text-anchor="middle">1 GIL, shared by all 5 threads</text>
  <line x1="220" y1="170" x2="590" y2="170" stroke="#c8bfb0" stroke-width="0.8"/>
  <rect x="220" y="163" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <line x1="220" y1="188" x2="590" y2="188" stroke="#c8bfb0" stroke-width="0.8"/>
  <rect x="284" y="181" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <line x1="220" y1="206" x2="590" y2="206" stroke="#c8bfb0" stroke-width="0.8"/>
  <rect x="348" y="199" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <line x1="220" y1="224" x2="590" y2="224" stroke="#c8bfb0" stroke-width="0.8"/>
  <rect x="412" y="217" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <line x1="220" y1="242" x2="590" y2="242" stroke="#c8bfb0" stroke-width="0.8"/>
  <rect x="476" y="235" width="64" height="14" fill="#1a1612" fill-opacity="0.15" stroke="#1a1612" stroke-width="0.8"/>
  <text x="400" y="266" font-size="10.5" fill="#7a6e62" text-anchor="middle">same total time as sequential: threads take turns holding the one GIL</text>

  <!-- BAND 3: processes -->
  <text x="20" y="312" font-size="13" font-weight="bold" fill="#1a1612">ProcessPoolExecutor</text>
  <text x="20" y="328" font-size="10.5" fill="#7a6e62">5 processes</text>
  <rect x="210" y="300" width="120" height="16" fill="none" stroke="#c8bfb0" stroke-width="1.2" rx="3"/>
  <rect x="220" y="303" width="64" height="10" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="210" y="320" width="120" height="16" fill="none" stroke="#c8bfb0" stroke-width="1.2" rx="3"/>
  <rect x="220" y="323" width="64" height="10" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="210" y="340" width="120" height="16" fill="none" stroke="#c8bfb0" stroke-width="1.2" rx="3"/>
  <rect x="220" y="343" width="64" height="10" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="210" y="360" width="120" height="16" fill="none" stroke="#c8bfb0" stroke-width="1.2" rx="3"/>
  <rect x="220" y="363" width="64" height="10" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="210" y="380" width="120" height="16" fill="none" stroke="#c8bfb0" stroke-width="1.2" rx="3"/>
  <rect x="220" y="383" width="64" height="10" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <text x="360" y="308" font-size="10.5" fill="#7a6e62">each: own interpreter, own GIL</text>
  <text x="400" y="416" font-size="10.5" fill="#7a6e62" text-anchor="middle">5x in one step: five GILs run at once, on five cores</text>

  <!-- BAND 4: subinterpreters -->
  <text x="20" y="462" font-size="13" font-weight="bold" fill="#1a1612">InterpreterPoolExecutor</text>
  <text x="20" y="478" font-size="10.5" fill="#7a6e62">5 interpreters</text>
  <rect x="210" y="445" width="380" height="100" fill="none" stroke="#c8bfb0" stroke-width="1.3" stroke-dasharray="5,4" rx="4"/>
  <text x="400" y="459" font-size="10.5" font-style="italic" fill="#7a6e62" text-anchor="middle">1 process, 5 interpreters, each its own GIL</text>
  <rect x="220" y="464" width="120" height="14" fill="none" stroke="#c8bfb0" stroke-width="1" rx="3"/>
  <rect x="226" y="467" width="64" height="8" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="220" y="482" width="120" height="14" fill="none" stroke="#c8bfb0" stroke-width="1" rx="3"/>
  <rect x="226" y="485" width="64" height="8" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="220" y="500" width="120" height="14" fill="none" stroke="#c8bfb0" stroke-width="1" rx="3"/>
  <rect x="226" y="503" width="64" height="8" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="220" y="518" width="120" height="14" fill="none" stroke="#c8bfb0" stroke-width="1" rx="3"/>
  <rect x="226" y="521" width="64" height="8" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <rect x="220" y="536" width="120" height="14" fill="none" stroke="#c8bfb0" stroke-width="1" rx="3"/>
  <rect x="226" y="539" width="64" height="8" fill="#8b1a1a" fill-opacity="0.25" stroke="#8b1a1a" stroke-width="0.8"/>
  <text x="400" y="562" font-size="10.5" fill="#7a6e62" text-anchor="middle">same 5x speedup, no extra process: one process, five GILs</text>
</svg>
