<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400"
     font-family="'JetBrains Mono', Consolas, monospace">
  <defs>
    <marker id="ts-tri" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f5f0e8" stroke="#1a1612" stroke-width="1"/>
    </marker>
  </defs>

  <!-- inheritance: Aluminum, Paper, Glass, Cardboard extend Trash -->
  <line x1="95" y1="190" x2="390" y2="132" stroke="#1a1612" stroke-width="1.2" marker-end="url(#ts-tri)"/>
  <line x1="265" y1="190" x2="430" y2="132" stroke="#1a1612" stroke-width="1.2" marker-end="url(#ts-tri)"/>
  <line x1="435" y1="190" x2="490" y2="132" stroke="#1a1612" stroke-width="1.2" marker-end="url(#ts-tri)"/>
  <line x1="605" y1="190" x2="530" y2="132" stroke="#1a1612" stroke-width="1.2" marker-end="url(#ts-tri)"/>

  <!-- fan-in: each subclass sorts by type(t) into one dict of bins -->
  <line x1="95" y1="280" x2="95" y2="310" stroke="#7a6e62" stroke-width="1"/>
  <line x1="265" y1="280" x2="265" y2="310" stroke="#7a6e62" stroke-width="1"/>
  <line x1="435" y1="280" x2="435" y2="310" stroke="#7a6e62" stroke-width="1"/>
  <line x1="605" y1="280" x2="605" y2="310" stroke="#7a6e62" stroke-width="1"/>
  <line x1="95" y1="310" x2="768" y2="310" stroke="#1a1612" stroke-width="1.3" marker-end="url(#ts-tri)"/>
  <text x="430" y="326" font-size="11.5" fill="#1a1612" text-anchor="middle">type(t)</text>

  <!-- Trash -->
  <rect x="350" y="20" width="220" height="112" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="460" y="44" font-size="16" font-weight="bold" fill="#1a1612" text-anchor="middle">Trash</text>
  <line x1="350" y1="54" x2="570" y2="54" stroke="#c8bfb0" stroke-width="1"/>
  <text x="460" y="72" font-size="12" fill="#1a1612" text-anchor="middle">weight: float</text>
  <text x="460" y="88" font-size="12" fill="#1a1612" text-anchor="middle">value: ClassVar[float]</text>
  <text x="460" y="104" font-size="12" fill="#1a1612" text-anchor="middle">registry: ClassVar[dict]</text>
  <text x="460" y="120" font-size="12" fill="#1a1612" text-anchor="middle">+ create(name, weight)</text>

  <!-- Aluminum -->
  <rect x="20" y="190" width="150" height="90" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="95" y="212" font-size="14.5" font-weight="bold" fill="#1a1612" text-anchor="middle">Aluminum</text>
  <line x1="20" y1="222" x2="170" y2="222" stroke="#c8bfb0" stroke-width="1"/>
  <text x="95" y="242" font-size="12" fill="#1a1612" text-anchor="middle">value = 1.67</text>

  <!-- Paper -->
  <rect x="190" y="190" width="150" height="90" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="265" y="212" font-size="14.5" font-weight="bold" fill="#1a1612" text-anchor="middle">Paper</text>
  <line x1="190" y1="222" x2="340" y2="222" stroke="#c8bfb0" stroke-width="1"/>
  <text x="265" y="242" font-size="12" fill="#1a1612" text-anchor="middle">value = 0.10</text>

  <!-- Glass -->
  <rect x="360" y="190" width="150" height="90" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="435" y="212" font-size="14.5" font-weight="bold" fill="#1a1612" text-anchor="middle">Glass</text>
  <line x1="360" y1="222" x2="510" y2="222" stroke="#c8bfb0" stroke-width="1"/>
  <text x="435" y="242" font-size="12" fill="#1a1612" text-anchor="middle">value = 0.23</text>

  <!-- Cardboard -->
  <rect x="530" y="190" width="150" height="90" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="605" y="212" font-size="14.5" font-weight="bold" fill="#1a1612" text-anchor="middle">Cardboard</text>
  <line x1="530" y1="222" x2="680" y2="222" stroke="#c8bfb0" stroke-width="1"/>
  <text x="605" y="242" font-size="12" fill="#1a1612" text-anchor="middle">value = 0.79</text>

  <!-- Bins -->
  <rect x="770" y="265" width="190" height="90" fill="none" stroke="#c8bfb0" stroke-width="1.3" rx="4"/>
  <text x="865" y="288" font-size="14.5" font-weight="bold" fill="#1a1612" text-anchor="middle">bins</text>
  <line x1="770" y1="298" x2="960" y2="298" stroke="#c8bfb0" stroke-width="1"/>
  <text x="865" y="318" font-size="11.5" fill="#1a1612" text-anchor="middle">type[Trash] -&gt;</text>
  <text x="865" y="334" font-size="11.5" fill="#1a1612" text-anchor="middle">list[Trash]</text>
</svg>
