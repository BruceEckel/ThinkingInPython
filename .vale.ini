# Vale configuration for the book prose. See https://vale.sh.
#
# Vale parses Markdown and checks only text, not code spans or fenced code, so
# the rules below never fire on identifiers or examples. Spelling is handled
# separately by codespell (`make spell`); Vale here enforces house style only.
#
# Vale is a standalone binary (not a Python package), so install it once:
#   winget install errata-ai.Vale     (Windows)
#   brew install vale                  (macOS)
#   https://vale.sh/docs/install       (others)
# Then run `make prose`.

# Packages must be in this core section, before any [glob] section, or
# `vale sync` ignores them (it reports "Synced 0 package(s)").
StylesPath = styles
MinAlertLevel = suggestion
Packages = write-good, proselint

[*.md]
# Downloading a package is not the same as enabling it: list each synced style
# here for its rules to run.
BasedOnStyles = House, write-good, proselint

# These rules are too noisy for this book. Comment a line out (prefix it with #)
# to re-enable that rule at its package default. Vale has no "once per file"
# option, so disabling is the way to quiet a chatty rule.
#   - E-Prime flags every form of "to be" (is/are/was/it's).
#   - TooWordy flags ordinary words like "However", "Multiple", "Modify".
#   - proselint.But forbids starting a paragraph with "But".
write-good.E-Prime = NO
write-good.TooWordy = NO
proselint.But = NO
